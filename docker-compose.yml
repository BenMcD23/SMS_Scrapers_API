services:
  api:
    build: .
    # Map host 8000 to container 8000 (matching your Dockerfile EXPOSE)
    ports:
      - "8000:8000" 
    # Use uvicorn for FastAPI
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    shm_size: 768mb
    deploy:
      resources:
        limits:
          memory: 6gb
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/app
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api