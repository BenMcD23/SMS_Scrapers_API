services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: 317_SMS
      POSTGRES_USER: sms_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms_user -d 317_SMS"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    env_file:
      - .env
    command: sh -c "alembic -c database/alembic.ini upgrade head && uvicorn api:app --host 0.0.0.0 --port 8000"
    shm_size: 768mb
    deploy:
      resources:
        limits:
          memory: 6gb
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/app:/app
      - DATABASE_URL=postgresql+psycopg2://sms_user:${POSTGRES_PASSWORD}@db:5432/317_SMS
    depends_on:
      db:
        condition: service_healthy

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale-prod
    hostname: 317-sms-api
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve-config.json
      - TS_HOSTNAME=317-sms-api 
    volumes:
      - ./tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - ./serve-config.json:/config/serve-config.json:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
