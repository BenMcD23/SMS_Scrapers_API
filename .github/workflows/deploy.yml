name: Deploy API

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  # Guardrail: a broken migration graph (duplicate revision ids or more than one
  # head) makes `alembic upgrade head` fail on container start, which takes the
  # API down. Catch it here — on PRs before merge, and again before every deploy.
  check-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install alembic
      - name: Assert a single, unambiguous migration head
        run: |
          out=$(alembic -c database/alembic.ini heads 2>&1)
          echo "$out"
          if echo "$out" | grep -qi 'more than once'; then
            echo "::error::Duplicate Alembic revision id — two migrations share a revision. Rename one."
            exit 1
          fi
          if [ "$(echo "$out" | grep -c '(head)')" -ne 1 ]; then
            echo "::error::Expected exactly one Alembic head. Rebase/merge your migrations into a single chain."
            exit 1
          fi

  deploy:
    needs: check-migrations
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Set environment
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
          fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ENV
          script: |
            set -e
            cd ~/sms-api/$ENV
            git pull origin ${{ github.ref_name }}
            # The tailscale service uses a fixed container_name, so recreation can
            # fail with a name conflict if an orphaned container is left behind.
            # Remove it first so compose can create it cleanly.
            docker rm -f tailscale-$ENV 2>/dev/null || true
            if [[ "$ENV" == "prod" ]]; then
              docker compose -p sms-prod -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            else
              docker compose -p sms-dev -f docker-compose.yml -f docker-compose.dev.yml up -d --build
            fi
            docker image prune -f
