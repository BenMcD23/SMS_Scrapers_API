name: Deploy API

on:
  push:
    branches:
      - main
      - development

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set environment
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
          fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ENV
          script: |
            set -e
            cd ~/sms-api/$ENV
            git pull origin ${{ github.ref_name }}
            if [[ "$ENV" == "prod" ]]; then
              docker compose -p sms-prod -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            else
              docker compose -p sms-dev -f docker-compose.yml -f docker-compose.dev.yml up -d --build
            fi
            docker compose -p sms-$ENV exec api alembic -c database/alembic.ini upgrade head
            docker image prune -f
